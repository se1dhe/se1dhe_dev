      /* Reset default zoom and scaling */
      html {
        zoom: 1;
        -moz-transform: scale(1);

        -webkit-transform-origin: 0 0;

        transform-origin: 0 0;

      body {
        text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
    </style>
